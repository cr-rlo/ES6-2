<script>
const $ = {};


/* $.qs = document.querySelector.bind(document);
// .bind(document)를 붙이면 this는 무조건 document로 고정
$.qsa = document.querySelectorAll.bind(document); */


$.qs = (sel, parent = document) => parent.querySelector(sel);
// .bind(document)를 붙이면 this는 무조건 document로 고정
$.qsa = (sel, parent = document) => parent.querySelectorAll(sel);
$.find = _.curry($.qs);
$.findAll = _.curry($.qsa);


$.el = html => {
  const wrap = document.createElement('div');
  // 화면에는 보이지 않지만, 브라우저 메모리에 div라는 상자를 하나 만듦
  wrap.innerHTML = html;
  // 브라우저에게 이 문자열(html)을 태그로 해석해서 wrap 상자 안에 넣으라는 명령
  // 브라우저는 이 순간 문자열을 실제 DOM노드로 바꿈
  return wrap.children[0];
  // 방금 생성된 요소가 든 상자(div)를 return
};

$.append = _.curry((parent, child) => parent.appendChild(child));

$.closest = _.curry((sel, el) => el.closest(sel));

$.remove = el => el.parentNode.removeChild(el);

$.on = (event, f) => els => 
  _.each(el => el.addEventListener(event, f), _.isIterable(els) ? els : [els]);

$.addClass = _.currry((name, el) => el.classList.add(className));


</script>

<script>
  const Ui = {};

Ui.message = ({msg, btns}) => new Promise(resolve => _.go(
  `
  <div class = "confirm">
    <div class = "body">
      <div class = "msg">${optiom.msg}</div>
      <div class = "buttons">
        ${_.strMap(btn => `
          <button type = "button" class = "${btn.type}">${btn.name}</button>
        `, btns)}
      </div>
    </div>
  </div>
  `,
  $.el,
  $.append($.qs('body')),
  ..._.map(btn => _.tap(
    $.find('${btn.type}'),
    $.on('click', e => _.go(
    e.currentTarget,
    $.closest('.confirm'),
    $.remove,
    _ => resolve(btn.value)
  ))),btns)
));

Ui.message({
  msg: '삭제되었습니다',
  btns: [{
    name: '취소',
    type: 'cancle',
    value: true
  }, {
    name: '확인',
    type: 'ok',
    value: true
  }]
});

Ui.confirm = msg => Ui.message({
  msg,
  btns:[
    { name: '취소', type: 'cancle', value: false },
    { name: '확인', type: 'ok', value: true },
  ]
});

Ui.alert = msg => Ui.message({
  msg,
  btns:[
    { name: '확인', type: 'ok', value: false }]
});


Ui.remover = (btnSel, targetSel, before = a=>a, after) => _.pipe(
  $.findAll(btnSel),
  $.on('click', async ({currentTarget: ct}) => 
    await Ui.confirm('정말 삭제하시겠습니까?') && 
      _.go(
        ct,
        $.closest(targetSel),
        _.tap(before),
        $.remove,
        _.tap(after)))
);



Ui.alert('삭제되었습니다');
Ui.confirm("정말 삭제하시겠습니까?");

</script>


<script>
// 이미지 목록 그리기
const Images = {};

Images.fetch = () => new Promise(resolve => setTimeout(() => resolve([
  // resolve는 비동기 작업이 끝났으니 이제 결과를 밖으로 보내겠다고 선언하는 것

  {},{},{},
]), 200));


const string = iter => _.reduce((a,b) => `${a}${b}`, iter);
_.strMap = _.pipe(L.map, string);



Images.tmpl = imgs => 
  `
  <div class = "images">
    ${_.strMap(img => `
      <div class = "image">
        <div class = "box"><img src="" lazy-src="${img.url}" class ="fade" alt="" </div>
        <div class = "name">${img.name}</div>
        <div class = "remove"></div>
      </div>
    `,imgs)}
  </div>
  `
;

Images.loader = limit => _.tap(
  $.findAll('img'),
  L.map(img => _ => new Promise(resolve => {
    img.onload = () => resolve(img);
    img.src = img.getAttribute('lazy-src');
  })),
  C.takeAllWithLimit(limit),
  _.each(_.each($.addClass('fade-in')))
  );

_.groupBySize = _.curry((size, iter) => {
  let r = L.range(Infinity);
  return _.groupBy(_ => Math.floor(r.next().value / size), iter);
});


C.takeAllWithLimit = _.curry((limit, iter) => 
  _.go(
    iter,
    _.groupBySize(limit),
    L.values,
    L.map(L.map(f => f())),
    L.map(C.takeAll))
);

_.go(
  Images.fetch(),
  Images.tmpl,
  $.el,
  // el => document.querySelector('body').appendChild(el),
  $.append($.qs(body)),
  Ui.remover('.remove', '.image', _ => console.log('서버통신!')),Images.loader(4));


</script>
