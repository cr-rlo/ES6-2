<script>
// reduce 하나보다 map + filter + reduce
console.log(
  _.reduce((total, u) => {
    if(u.age >= 30 )return total;
    // 30세 이상이 걸리면 더하지 않고 total 값 그대로 반환
    return total + u.age;
    // 걸리지 않으면 total 값 누적
  },
  0,
  users));
  // 3개의 인자(함수, 초기값, 데이터))


console.log(
_.reduce((total, u) => u.age >= 30 ? total : total + u.age,

users));
