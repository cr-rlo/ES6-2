<script>
// Model, Collection
class Model{
    constructor(attrs = {}){
      this._attrs = attrs;
    }
    get(k){
      return this._attrs[k];
    }
    set(k,v){
      this._attrs[k] = v;
      return this;
      // 이 일을 끝낸 뒤에 이 클래스 객체를 결과 값으로 리턴
    }
  }
// 이런 코드라면 큰 추상화에 대한 정리는 객체지향적으로 했다고 하더라도 결국에는 내부에 for .. 과 같은 로직을 작성해야 함 -> 이를 대체하는 것이 map, filter등과 같은 이터러블 프로그래밍

class Collection{
  constructor(models = []){
    this._models = models;
  }
  // models: Collection을 만들 때 넣어준 재료(데이터 배열)
  // this: 지금 새로 만들어지는 Collection 객체 자신
  // this._models = models;: 밖에서 입력한 models 데이터 배열을 Collection의 _models라는 창고에 보관해라
  at(idx){
    return this._models[idx];
  }
  add(model){
    this._models.push(model);
    return this;
  }
  *[Symbol.iterator](){
    for (const model of this._models){
      yield model;
      // 이 부분을 yield* this._models; 한 줄로 바꿔쓰는 것도 가능
    }
  } // 제너레이터 함수는 함수가 호출되어도 즉시 모든 코드를 실행하지 않고 호출자가 데이터를 요구할 때마다 코드를 한 단계씩 실행
  // 데이터를 하나씩 꺼내주는 특별한 함수, *이 있어야만 yield사용가능
  // 함수 내부에서 yield를 만나면 현재 실행 위치와 변수 상태를 기억한 채로 함수 실행을 일시 정지
  // ()안에 아무것도 없는 이유는 외부에서 데이터를 받아와 처리하는 것이 아니라 내부 this._models에 이미 가지고 있는 데이터를 꺼내주기만 하는 함수기 때문
}
// Collection을 반복가능한 객체로 만들기 -> 배열과 같은 대우 => _.map, each 등 사용 가능
// *[Symbol.iterator]()이 클래스를 배열처럼 순회할 수 있게 해줌
// 자바 스크립트 클래스 내부에서는 function 생략



const coll = new Collection();
coll.add(new Model({ id:1, name: 'AA'}));
coll.add(new Model({ id:3, name: 'BB'}));
coll.add(new Model({ id:5, name: 'CC'}));


_.go(
  L.range(3),
  // [0,1,2]라는 숫자를 필요할 때 하나씩 만듦
  // 인덱스를 직접 알고 있어야함(coll의 길이)
  L.map(i => coll.at(i)),
  // 숫자가 들어오면 collection에서 해당 순번의 model객체로 변화시킴
  // Model{name: 'AA'}, Model{name: 'BB'}, Model{name: 'CC'}
  L.map(m => m.get('name')),
  // model이 들어오면 그 안의 name값만 쏙 뽑아 변신시킴
  // 'AA', 'BB', 'CC'
  _.each(console.log)
);

_.go(
  coll,
  L.map(m => m.get('name')),
  _.each(console.log)
);

</script>
