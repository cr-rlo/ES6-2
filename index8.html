<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script src="https://unpkg.com/fxjs/dist/fx.js"></script>
</head>
<body>
## 시간을 이터러블로 다루기
<script>
// 1. range와 take 재해석
_.go(
  _.range(10), // 0부터 9까지의 배열
  _.take(3), // 앞에서부터 3개만 자르기
  _.each(console.log)
);


_.go(
  L.range(1, 10), // 1부터 10까지의 이터러블, 최대 10번 일어날 일 
  L.map(n => _.delay(500 * n, n)), // delay는 첫 번째 인자로 얼마나 기다릴 것인가에 대한 시간, 두번째 인자로 이 프로미스가 성공했을 때 retur할 값, curry로 구현되어 있음
  L.filter(a => a % 2),
  L.take(3), // 최대 3개의 값을 필요하고, 최대 3번의 일을 수행
  _.each(console.log)
);

_.go(
  L.range(1, 10), // 1부터 10까지의 이터러블, 최대 10번 일어날 일 
  L.map(_.delay(500)), 
  L.filter(a => a % 2),
  L.map(_ => new Date()), // _ =>을 하면 위에서 내려오는 값은 사용하지 않는다는 의미
  L.take(3), // 최대 3개의 값을 필요하고, 최대 3번의 일을 수행
  _.each(console.log)
);

</script>

<script>
// takeWhile, takeUntil
// take가 숫자를 통해서 일어날 수를 제약하는 함수라면 위 함수들은 좀 더 동적으로 제약하는 함수
_.go(
  [1,2,3,4,5,6,7,8,0,0,0],
  _.takeWhile(a => a), // true로 평가되는 값이냐 판단 => 마치 while문을 쓸 때처럼 true일 때까지만 해당하는 값을 담도록
  _.each(console.log)
);

_.go(
  [1,2,3,4,5,6,7,8,0,0,0],
  _.takeUntil(a => !a), // 처음으로 true인 값을 만날때까지, 그 번째까지 가져옴
  _.each(console.log)
);


</script>
<script>
// 할 일들을 이터러블(리스트)로 바라보기, 스케쥴러 만들기
const track = [
  {cars: ['철수', '영희', '철희', '영수']},
  {cars: ['하든', '커리', '듀란트', '탐슨']},
  {cars: ['폴', '어빙', '릴라드', '맥컬럼']},
  {cars: ['스파이더맨', '아이언맨']},
  {cars: []}
  // 1조, 2조 각 조끼리 경주를 시키되, 4명이 다 차지 않은 조는 출발 x
  // 1조를 출발시키고 어느정도 딜레이를 준 후 2조를 출발시키는 형식
]; 

_.go(
  L.range(Infinity),
  L.map(i => track[i]),
  L.takeWhile(({cars: {length}}) => length == 4),
  _.each(console.log)
);

_.go(
  L.range(Infinity),
  // 필요할 때마다 숫자를 하나씩 만듦
  L.map(i => track[i]),
  // 생성된 숫자 i를 이용해 track배열에서 데이터를 하나씩 꺼냄
  L.map(({cars}) => cars),
  // 꺼낸 데이터(객체)에서 cars라는 속성만 뽑아냄(구조분해)
  L.map(_.delay(2000)),
  // 데이터를 처리할 때마다 2초씩 지연
  L.takeWhile(({length: l}) => l == 4),
  // 자동차 대수가 4대인 경우에만 데이터를 넘겨줌
  L.flat,
  // 배열인 cars를 하나로 평평하게 펴기
  L.map(car => `{car} 출발`),
  _.each(console.log)
);

_.go(
  L.range(Infinity),
  L.map(i => track[i]),
  L.map(({cars}) => cars),
  L.map(_.delay(2000)),
  L.takeUntil(({length: l}) => l < 4),
  L.flat,
  L.map(car => `{car} 출발`),
  _.each(console.log)
);

</script>

</body>
