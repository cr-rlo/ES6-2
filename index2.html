<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://unpkg.com/fxjs/dist/fx.js"></script>
</head>
<body>
  <script>
  // while을 range로
  function f1(end){
    let i = 0;
    while(i < end){
      console.log(i);
      ++i;

    }
  }
  f1(10);

  // 함수형 프로그래밍
  function f2(end){
    _.each(console.log, L.range(end));

  }
  f2(10);
  /* const L = {};
  L.range = function* (end) {
    let i = 0;
    while (i < end) {
     yield i; // 👈 여기서 계산을 멈추고 현재 i 값을 바깥으로 던집니다!
     i++;     // 다음 리모컨 버튼을 누르면 그제야 이 줄이 실행됩니다.
   }
  }; */


  // 홀수만 출력하도록 코딩
  function f3(end){
    _.each(console.log, L.range(1, end, 2));

  }

</script>
<script>
// 효과를 each로 구분
function f4(end){
  let i = 1;
  while (i < end){
    console.log(i);
    i += 2;
  }
}
f4(10);

function f5(end){
  _.go(
    L.range(1, end, 2),
    _.each(console.log)
  );
}

</script>

<script>
  // 추억의 별 그리기
  _.go(
    L.range(1,6),
    // 1부터 시작해서 6미만의 숫자 배열 만들기 위한 대기조(이터레이터) 생성
    // 1부터 6까지 아래로 넘겨줌
    L.map(_.range),
    // 위에서 숫자가 내려오면 그때 움직이겠다는 L.map
    // 숫자가 떨어지면 _.range가 발동하여 메모리에 진짜 배열을 생성함
    // 전체적으로는 지연 평가로 대기하다가 한 숫자가 들어올 때마다 그 숫자에 맞는 진짜 숫자 배열을 한 보따리씩 만들어 아래로 패스함
    L.map(_.map(_ => '*')),
    // 알맹이를 별로 바꾸기
    // L.map은 대기하다가 진짜 배열이 내려오면 _.map이 작동하면서 배열 안의 요소들을 전부 순회하면서 숫자들은 지우고 ['*', '*'..]와 같은 배열로 바꿈
    L.map(_.reduce((a,b) => `${a}${b}`)),
    // 위에서 별 배열이 내려오면 _.reduce가 실행되어 파편화되어있던 별 문자열을 이어붙인 문자열로 압축
    reduce((a,b) => `${a}\n${b}`),
    // 받은 문자열들을 순서대로 하나씩 내려 받아서 줄바꿈 기호를 껴 넣으며 다층 탑 문자열로 축약
    console.log
  );

  const join = sep => _.reduce((a,b) => `${a}{sep}${b}`);
  _.go(
     L.range(1,6),
     L.map(L.range),
     L.map(L.map(_ => '*')),
     L.map(join('')),
     join('\n'),
     console.log);
</script>

<script>
  // 추억의 구구단
  _.go(
    _.range(2,10),
    _.map(a => _.go(
      _.range(1,10),
      _.map(b => `${a}x${b}=${a*b}`),
      join('\n')
    )),
    join('\n\n'),
    console.log
  );

</script>
</body>
</html>
