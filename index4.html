<script>
// query, queryToObject
const obj1 = {
  a: 1,
  b: undefined,
  c: 'CC',
  d: 'DD'
};

function query1(obj){
  let res = '';
  for(const k in obj){
    const v = obj[k];
    if(v == undefined) continue;
    if(res != '') res+= '&';
    res += k + '=' + v;
  }
  return res;
}
console.log(query1(obj1));


function query2(obj){
  return Object
    .entries(obj)
    .reduce((query,[k,v], i) => {
      if(v === undefined) return query;
      return query + (i > 0 ? '&' : '') + k + '=' + v;
    }, '');
}
console.log(query2(obj1));

    }, '');
  }



const query3 = obj => 
  _.reduce((a,b) => `${a}&${b}`,
    _.map(([k ,v]) => `${k}${v}`,
      _.reject(([k,v]) => v === undefined,
        Object.entries(obj))));

console.log(query3(obj1));

const query4 = obj => _.go(
  obj,
  Object.entries,
  _.reject(([_,v]) => v === undefined,
  _.map(([k ,v]) => `${k}${v}`,
  _.reduce((a,b) => `${a}&${b}`))));

console.log(query4(obj1));
